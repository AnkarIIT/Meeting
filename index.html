<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .glass-panel {
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
      }

      /* Refined Mint-Green and White Mesh Gradient from the reference image */
      .bg-gradient-mesh {
        background-color: #f8faf9;
        background-image: 
          radial-gradient(at 0% 0%, hsla(97, 56%, 88%, 0.8) 0px, transparent 50%),
          radial-gradient(at 25% 40%, hsla(140, 60%, 94%, 0.6) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsla(120, 45%, 92%, 0.4) 0px, transparent 50%),
          radial-gradient(at 100% 0%, hsla(190, 40%, 98%, 1) 0px, transparent 50%),
          radial-gradient(at 80% 50%, hsla(160, 30%, 96%, 0.5) 0px, transparent 50%),
          radial-gradient(at 100% 100%, hsla(0, 0%, 100%, 1) 0px, transparent 50%);
      }

      /* Dark Mode Mesh: Deep Forest/Slate with Mint Glows */
      .dark .bg-gradient-mesh {
        background-color: #0b1110;
        background-image: 
          radial-gradient(at 0% 0%, hsla(160, 80%, 10%, 1) 0px, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(165, 70%, 5%, 1) 0px, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(170, 60%, 12%, 1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsla(150, 40%, 6%, 1) 0px, transparent 50%);
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fade-out {
        from { opacity: 1; }
        to { opacity: 0; transform: scale(0.98); }
      }

      @keyframes slide-in-from-bottom {
        from { transform: translateY(10px); }
        to { transform: translateY(0); }
      }

      @keyframes slide-in-from-right {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }

      @keyframes slide-out-to-right {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }

      .animate-in {
        animation-duration: 400ms;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-fill-mode: both;
      }

      .animate-out {
        animation-duration: 400ms;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-fill-mode: both;
      }

      .fade-in {
        animation-name: fade-in;
      }

      .fade-out {
        animation-name: fade-out;
      }

      .slide-in-from-bottom-2 {
        animation-name: slide-in-from-bottom;
      }

      .slide-in-from-right {
        animation-name: slide-in-from-right;
      }

      .slide-out-to-right {
        animation-name: slide-out-to-right;
      }

      .fill-mode-both {
        animation-fill-mode: both;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              apple: {
                blue: '#007AFF',
                gray: '#8E8E93',
                lightGray: '#F2F2F7',
                darkGray: '#1C1C1E'
              }
            }
          }
        }
      }
    </script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gradient-mesh transition-colors duration-500 overflow-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
